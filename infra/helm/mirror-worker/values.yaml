replicaCount: 1

image:
  # Replace YOUR_ORG with your GitHub organisation name (e.g. acme-corp).
  # Example: ghcr.io/acme-corp/mirror-worker
  repository: ghcr.io/YOUR_ORG/mirror-worker
  tag: latest
  pullPolicy: IfNotPresent

# imagePullSecrets: list of k8s Secrets containing Docker registry credentials.
# Required when the GHCR image is private. Leave empty for public images.
# To create the secret for a private GHCR image:
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=YOUR_GITHUB_USER \
#     --docker-password=YOUR_PAT \
#     --namespace mirror
# Then set:
#   imagePullSecrets:
#     - name: ghcr-pull-secret
imagePullSecrets: []

service:
  type: ClusterIP
  port: 3001

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: 1000m

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: false

# KEDA ScaledObject — disabled by default; enable per overlay when KEDA is installed in the cluster.
scaledObject:
  enabled: false
  # Minimum replicas when there is work in the queue
  minReplicaCount: 1
  # Maximum replicas under load
  maxReplicaCount: 5
  # Replicas when queue is empty (requires KEDA >= 2.9; set to 0 to scale-to-zero)
  idleReplicaCount: 1
  # Inngest queue depth trigger
  inngest:
    # Average queue depth per replica before scaling up
    queueDepthTarget: "5"
    # Name of the Inngest function / queue to watch
    functionName: "generate-profile"

# Name of a pre-existing k8s Secret containing all app secrets.
# The chart reads from this Secret via envFrom; it never creates or generates secrets.
existingSecret: "mirror-secrets"

# Extra environment variables injected into the container as key-value pairs.
env: {}

nodeSelector: {}

tolerations: []

affinity: {}
