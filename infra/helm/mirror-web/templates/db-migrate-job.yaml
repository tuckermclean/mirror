{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "mirror-web.fullname" . }}-db-migrate
  labels:
    {{- include "mirror-web.labels" . | nindent 4 }}
  annotations:
    # Run on every install and upgrade. NOTE: post-* hooks run AFTER Helm applies
    # the Deployment, so new app pods may begin rolling before this Job completes —
    # Helm does not gate the rollout on a post-upgrade hook. Migrations here must be
    # backward-compatible with the previous app version for the brief overlap. (A
    # strict pre-traffic gate would require a pre-upgrade hook with the image already
    # present.)
    "helm.sh/hook": post-install,post-upgrade
    # Lower weight runs first; -5 ensures this runs before any other post hooks.
    "helm.sh/hook-weight": "-5"
    # Delete the previous Job before creating a new one, and delete on success.
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  # Retry up to 3 times before marking the Job failed and blocking the release.
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: db-migrate
        app.kubernetes.io/managed-by: Helm
    spec:
      # Must not restart the pod inline — use Job-level backoffLimit instead.
      restartPolicy: OnFailure
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Match the pod-level security context of the main deployment.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: db-migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Match the container-level security context of the main deployment.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command: ["pnpm", "db:migrate"]
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- if .Values.env }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
