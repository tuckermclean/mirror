{{- if .Values.autoscaling.enabled -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "mirror-web.fullname" . }}
  labels:
    {{- include "mirror-web.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "mirror-web.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- if .Values.autoscaling.customMetric.enabled }}
    - type: Pods
      pods:
        metric:
          name: {{ .Values.autoscaling.customMetric.name }}
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.customMetric.target }}
    {{- end }}
{{- end }}
