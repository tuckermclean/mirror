replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  customMetric:
    enabled: false

pdb:
  enabled: true
  minAvailable: 1

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: staging.mirror.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: mirror-staging-tls
      hosts:
        - staging.mirror.example.com

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
