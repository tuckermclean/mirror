replicaCount: 1

image:
  # Replace YOUR_ORG with your GitHub organisation name (e.g. acme-corp).
  # Example: ghcr.io/acme-corp/mirror-web
  repository: ghcr.io/YOUR_ORG/mirror-web
  tag: latest
  pullPolicy: IfNotPresent

# imagePullSecrets: list of k8s Secrets containing Docker registry credentials.
# Required when the GHCR image is private. Leave empty for public images.
# To create the secret for a private GHCR image:
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=YOUR_GITHUB_USER \
#     --docker-password=YOUR_PAT \
#     --namespace mirror
# Then set:
#   imagePullSecrets:
#     - name: ghcr-pull-secret
imagePullSecrets: []

# DB migration Helm hook — runs "node scripts/migrate.mjs" as a
# post-install/post-upgrade Job (the distroless runtime image has no pnpm; the
# Job invokes the standalone migration runner directly).
# When enabled=false the hook is NOT rendered, so migrations are YOUR
# responsibility and must be run manually before/around the deploy, e.g.:
#   DATABASE_URL="..." node scripts/migrate.mjs
# (or `pnpm db:migrate` from a checkout with the toolchain installed).
# See DEPLOY.md → "DB migration hook" for the documented manual path.
migration:
  enabled: true

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: 1000m

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  customMetric:
    enabled: false
    name: generations_in_flight
    target: 10

pdb:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: false

# Name of a pre-existing k8s Secret containing all app secrets.
# The chart reads from this Secret via envFrom; it never creates or generates secrets.
existingSecret: "mirror-secrets"

# Extra environment variables injected into the container as key-value pairs.
# Example:
#   env:
#     NEXT_PUBLIC_APP_URL: "https://mirror.example.com"
env: {}

nodeSelector: {}

tolerations: []

affinity: {}
