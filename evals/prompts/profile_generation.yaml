# promptfoo eval for the profile generation system prompt.
# The generation prompt lives at src/lib/prompts/generation_system.md and is
# registered as `prompts.profileGeneration` in src/lib/prompts/index.ts.
description: "Profile generation prompt eval — 5 rubric dimensions"
prompts:
  - file://../../src/lib/prompts/generation_system.md

providers:
  - id: anthropic:claude-opus-4-7

tests:
  - description: "Output passes JSON schema (all required sections present)"
    vars:
      voice_card: "fixture://../../evals/personas/sre-senior-01.json"
      current_linkedin: "fixture://../../fixtures/linkedin-pages/seed-profile.html"
      benchmark_exemplars: "fixture://../../fixtures/benchmark-profiles/sre-top5.json"
    assert:
      - type: json-schema
        value:
          type: object
          required: [headline, about, experience, education, skills]
          additionalProperties: false
          properties:
            headline: { type: string }
            about: { type: string }
            experience: { type: array }
            education: { type: array }
            skills: { type: array, items: { type: string } }

  - description: "Voice fidelity >= 4/5 vs user's own speech"
    vars:
      voice_card: "fixture://../../evals/personas/sre-senior-01.json"
      current_linkedin: "fixture://../../fixtures/linkedin-pages/seed-profile.html"
      benchmark_exemplars: "fixture://../../fixtures/benchmark-profiles/sre-top5.json"
    assert:
      - type: llm-rubric
        value: "Rate voice fidelity 1-5: does the output sound like the person described in the Voice Card? Pass if >= 4."

  - description: "Recruiter-eye lift >= 3/5"
    vars:
      voice_card: "fixture://../../evals/personas/sre-senior-01.json"
      current_linkedin: "fixture://../../fixtures/linkedin-pages/seed-profile.html"
      benchmark_exemplars: "fixture://../../fixtures/benchmark-profiles/sre-top5.json"
    assert:
      - type: llm-rubric
        value: "Rate recruiter-eye lift 1-5: would a recruiter find this profile significantly more compelling than the original? Pass if >= 3."

  - description: "Output contains no extra keys beyond the five canonical fields"
    vars:
      voice_card: "fixture://../../evals/personas/sre-senior-01.json"
      current_linkedin: "fixture://../../fixtures/linkedin-pages/seed-profile.html"
      benchmark_exemplars: "fixture://../../fixtures/benchmark-profiles/sre-top5.json"
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          const allowed = new Set(["headline", "about", "experience", "education", "skills"]);
          return Object.keys(r).every(k => allowed.has(k));
