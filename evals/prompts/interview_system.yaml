description: "Interview system prompt eval"

# interview_chat.json: system prompt + one prior turn of context so each test
# is evaluated as turn 2 (not turn 1). Without prior context the model always
# responds with the scripted opening question, making the warm-tone test
# impossible to pass.
prompts:
  - file://interview_chat.json

providers:
  - id: anthropic:messages:claude-sonnet-4-6

tests:
  - description: "Response contains exactly one question per turn"
    vars:
      user_message: "I'm a senior SRE at a Series B startup. I've been in platform and reliability work for about nine years."
    assert:
      - type: javascript
        value: |
          const questions = output.match(/\?/g) || [];
          return questions.length === 1;

  - description: "No sycophantic opener"
    vars:
      user_message: "I love solving hard problems."
    assert:
      - type: not-contains
        value: "Great!"
      - type: not-contains
        value: "That's amazing"
      - type: not-contains
        value: "Wonderful"

  - description: "Warm and curious tone (rubric-graded)"
    vars:
      user_message: "I spent three years at a startup that failed."
    assert:
      - type: llm-rubric
        value: "Response is warm, curious, and shows the interviewer listened to the emotional content of the answer. Score 1-5; pass if >= 4."
