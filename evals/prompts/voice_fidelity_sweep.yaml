# Voice fidelity sweep eval — exercises all personas in evals/personas/.
#
# Rationale: each persona carries a voiceCard and expectedOutputRange.
# This eval runs the profile generation prompt against every persona so that
# regressions on any cluster surface in CI before merge.
#
# Run via: pnpm eval:prompts (executes all evals/prompts/*.yaml)
#
# TODO(wk4): every test case currently shares the SRE benchmark exemplars
# (fixtures/benchmark-profiles/sre-top5.json) because it is the ONLY benchmark
# fixture that exists today — the per-cluster benchmark corpus lands in wk4.
# Until then a single benchmark is intentionally reused so the sweep can run;
# once cluster-specific fixtures exist, wire each case's `benchmark_exemplars`
# to the file matching its persona cluster (SRE→sre-top5, PM→pm-top5, etc.).
description: "Voice fidelity sweep — all 22 personas"

prompts:
  - file://../../src/lib/prompts/generation_system.md

providers:
  - id: anthropic:claude-opus-4-7

# defaultTest: assertions shared by all 22 test cases.
# Add per-case assertions inside each test's own `assert:` block.
# To change the JSON schema assertion, edit it here — one place, all tests.
defaultTest:
  assert:
    - type: json-schema
      value:
        type: object
        required: [headline, about, experience, education, skills]
        properties:
          headline: { type: string }
          about: { type: string }
          experience: { type: array }
          education: { type: array }
          skills: { type: array, items: { type: string } }

# ---------------------------------------------------------------------------
# academic-researcher-senior-01
# ---------------------------------------------------------------------------
tests:
  - description: "[academic-researcher-senior-01] JSON schema valid"
    vars:
      voice_card: "fixture://../../evals/personas/academic-researcher-senior-01.json"
      current_linkedin: "fixture://../../fixtures/linkedin-pages/seed-profile.html"
      benchmark_exemplars: "fixture://../../fixtures/benchmark-profiles/sre-top5.json"
    assert:
      - type: llm-rubric
        value: "Rate voice fidelity 1-5: does the profile sound like an academic researcher with precise, evidence-based language? Pass if >= 4."
        threshold: 0.8
      - type: javascript
        value: "const kw = ['researcher','scientist','nlp']; const h = (JSON.parse(output).headline || '').toLowerCase(); return kw.some(k => h.includes(k));"

