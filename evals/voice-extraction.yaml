description: "Voice Card extraction eval — deterministic schema/structural assertions (B2)"

# Use a top-level file:// reference so promptfoo's processJsonFile path resolves
# the nested file:// reference in the system message content via maybeLoadConfigFromExternalFile.
# A raw: block with an inline JSON string does NOT expand file:// in message content
# (maybeFilePath returns false for multi-line strings), so the LLM would receive the
# literal path string instead of the prompt text.
#
# Prompt note: src/lib/prompts/voice_extraction.md (loaded via voice-extraction-messages.json)
# contains a ```json ... ``` code-fence schema example at line 14.  That fence is for
# HUMAN READABILITY ONLY — the model is explicitly instructed (further down in the same
# file) to output raw JSON with NO code fence.  The example shape is illustrative; it
# does not override the "no fence" instruction that follows it.
prompts:
  - file://helpers/voice-extraction-messages.json

# EVAL_MODEL is documented in .env.example. Override per-run: EVAL_MODEL=<id> pnpm eval:voice.
# The fallback below is a hardcoded string — it is NOT derived at runtime from generation.ts
# (which maintains its own separate MODEL constant). To use a different model, set EVAL_MODEL
# in .env.local or pass it inline; there is no shared project-wide model constant yet.
providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      temperature: 0

defaultTest:
  vars:
    transcript: "file://./fixtures/voice-extraction.txt"

tests:
  - description: "VoiceCard schema — all structural assertions against one model output"
    assert:
      - type: javascript
        value: "file://./helpers/assert-json-parseable.cjs"


      - type: javascript
        value: "file://./helpers/assert-voice-card-schema.cjs"

      # Vocabulary upper-bound (≤ 30) is not part of the schema, so it stays
      # inline here. The lower bound is intentionally absent: VoiceCardSchema
      # does not enforce .min(1) at the array level, so an empty vocabulary is
      # schema-valid. Asserting len >= 1 here would reject outputs that pass
      # schema validation, creating a false-positive failure. If a non-empty
      # vocabulary becomes a hard requirement, add .min(1) to VoiceCardSchema
      # first, then restore the lower bound in this assertion.
      - type: javascript
        value: "file://./helpers/assert-sentence-length-distribution.cjs"

      - type: javascript
        value: "file://./helpers/assert-vocabulary-length.cjs"

      - type: llm-rubric
        value: "Output does NOT invent job titles, companies, or skills not present in input. Pass/fail."
