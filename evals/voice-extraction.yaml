description: "Voice Card extraction eval — deterministic schema/structural assertions (B2)"

prompts:
  - id: voice-extraction
    raw: |
      [
        {"role": "system", "content": "file://../src/lib/prompts/voice_extraction.md"},
        {"role": "user", "content": "Here is the chat history transcript to analyze:\n\n{{transcript}}\n\nExtract the Voice Card JSON now."}
      ]

providers:
  - id: anthropic:messages:claude-sonnet-4-6

defaultTest:
  vars:
    transcript: "file://./fixtures/voice-extraction.json"

tests:
  - description: "Output parses as valid JSON"
    assert:
      - type: javascript
        value: |
          const FENCE_RE = /^```(?:json)?\s*\n?([\s\S]*?)\n?```\s*$/;
          const stripped = FENCE_RE.exec(output.trim())?.[1]?.trim() ?? output.trim();
          try { JSON.parse(stripped); return true; } catch { return false; }

  - description: "Output matches VoiceCardSchema (5 camelCase fields, correct types)"
    assert:
      - type: javascript
        value: "file://./helpers/assert-voice-card-schema.cjs"

  - description: "sentenceLengthDistribution short+medium+long sums to 90–110"
    assert:
      - type: javascript
        value: |
          try {
            const FENCE_RE = /^```(?:json)?\s*\n?([\s\S]*?)\n?```\s*$/;
            const stripped = FENCE_RE.exec(output.trim())?.[1]?.trim() ?? output.trim();
            const parsed = JSON.parse(stripped);
            const dist = parsed.sentenceLengthDistribution;
            if (!dist || typeof dist !== "object") return false;
            const { short, medium, long } = dist;
            if (typeof short !== "number" || typeof medium !== "number" || typeof long !== "number") return false;
            const sum = short + medium + long;
            return sum >= 90 && sum <= 110;
          } catch {
            return false;
          }

  - description: "vocabulary.length is between 1 and 30"
    assert:
      - type: javascript
        value: |
          try {
            const FENCE_RE = /^```(?:json)?\s*\n?([\s\S]*?)\n?```\s*$/;
            const stripped = FENCE_RE.exec(output.trim())?.[1]?.trim() ?? output.trim();
            const parsed = JSON.parse(stripped);
            const len = Array.isArray(parsed.vocabulary) ? parsed.vocabulary.length : -1;
            return len >= 1 && len <= 30;
          } catch {
            return false;
          }
