description: "Voice Card extraction eval — deterministic schema/structural assertions (B2)"

# Use a top-level file:// reference so promptfoo's processJsonFile path resolves
# the nested file:// reference in the system message content via maybeLoadConfigFromExternalFile.
# A raw: block with an inline JSON string does NOT expand file:// in message content
# (maybeFilePath returns false for multi-line strings), so the LLM would receive the
# literal path string instead of the prompt text.
prompts:
  - file://helpers/voice-extraction-messages.json

# EVAL_MODEL defaults to 'claude-sonnet-4-6'. Override per-run with EVAL_MODEL=… pnpm eval:voice.
providers:
  - id: "anthropic:messages:{{env.EVAL_MODEL || 'claude-sonnet-4-6'}}"
    config:
      temperature: 0

defaultTest:
  vars:
    transcript: "file://./fixtures/voice-extraction.txt"

tests:
  - description: "VoiceCard schema — all structural assertions against one model output"
    assert:
      # JSON validity, field types, distribution bounds + sum-to-1, and non-empty
      # strings are all enforced by the shared schema mirror (the single
      # documented mirror of VoiceCardSchema). It also strips the code fence.
      - type: javascript
        value: "file://./helpers/assert-voice-card-schema.cjs"

      # Vocabulary upper-bound (≤ 30) is not part of the schema, so it stays
      # inline here. The lower bound is intentionally absent: VoiceCardSchema
      # does not enforce .min(1) at the array level, so an empty vocabulary is
      # schema-valid. Asserting len >= 1 here would reject outputs that pass
      # schema validation, creating a false-positive failure. If a non-empty
      # vocabulary becomes a hard requirement, add .min(1) to VoiceCardSchema
      # first, then restore the lower bound in this assertion.
      - type: javascript
        value: |
          try {
            // canonical: src/lib/voice-card/fence.ts — keep in sync
            const FENCE_RE = /^```(?:json)?\s*\n?([\s\S]*?)\n?```\s*$/i;
            const stripped = FENCE_RE.exec(output.trim())?.[1]?.trim() ?? output.trim();
            const parsed = JSON.parse(stripped);
            const len = Array.isArray(parsed.vocabulary) ? parsed.vocabulary.length : -1;
            return len >= 0 && len <= 30;
          } catch {
            return false;
          }
