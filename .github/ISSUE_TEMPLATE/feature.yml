name: Feature Request
description: Something to build
labels: ["agent-work"]
body:
  - type: input
    id: title
    attributes:
      label: What should be built?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why? (user value)
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Done when...
      placeholder: "- Condition 1\n- Condition 2"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options: [Backend, Frontend/UI, Full-stack, Design, Infra/DevOps, Docs]
  - type: checkboxes
    id: flags
    attributes:
      label: Flags
      options:
        - label: Touches auth/permissions
        - label: Database schema change
        - label: Needs UX design first
        - label: Performance-sensitive
