name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ${{ github.repository_owner }}/mirror-web
  WORKER_IMAGE: ${{ github.repository_owner }}/mirror-worker

jobs:
  # ── 1. Build and push multi-arch images ──────────────────────────────────────
  docker-release:
    name: Build & Push Multi-Arch Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: mirror-web
            dockerfile: Dockerfile
            image_env: WEB_IMAGE
          - name: mirror-worker
            dockerfile: Dockerfile.worker
            image_env: WORKER_IMAGE
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff9eefd33d17d7c8f5c  # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de9338a107b4408efb4e4f3dd7e63f6  # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a09e8b1fcfdd839ea7c3e30  # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env[matrix.image_env] }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push multi-arch image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Package and push Helm charts to GHCR OCI registry ────────────────────
  helm-release:
    name: Package & Push Helm Charts
    runs-on: ubuntu-latest
    needs: docker-release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112  # v4.3.0
        with:
          version: v3.17.0

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ${{ env.REGISTRY }} \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Extract semver from tag
        id: version
        run: |
          # Strip leading 'v' from the tag (e.g. v1.2.3 -> 1.2.3)
          echo "semver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update chart versions to match release tag
        run: |
          SEMVER="${{ steps.version.outputs.semver }}"
          sed -i "s/^version:.*/version: ${SEMVER}/" infra/helm/mirror-web/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${SEMVER}\"/" infra/helm/mirror-web/Chart.yaml
          sed -i "s/^version:.*/version: ${SEMVER}/" infra/helm/mirror-worker/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${SEMVER}\"/" infra/helm/mirror-worker/Chart.yaml

      - name: Package mirror-web chart
        run: helm package infra/helm/mirror-web --destination /tmp/helm-packages

      - name: Package mirror-worker chart
        run: helm package infra/helm/mirror-worker --destination /tmp/helm-packages

      - name: Push mirror-web chart to GHCR
        run: |
          helm push /tmp/helm-packages/mirror-web-${{ steps.version.outputs.semver }}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/helm

      - name: Push mirror-worker chart to GHCR
        run: |
          helm push /tmp/helm-packages/mirror-worker-${{ steps.version.outputs.semver }}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/helm

  # ── 3. Trigger staging deploy ────────────────────────────────────────────────
  staging-deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: helm-release
    environment: staging
    steps:
      - name: Trigger staging deployment
        run: echo "deploy to staging — tag ${{ github.ref_name }}"
      # TODO: replace the echo above with your actual deploy step, e.g.:
      #   - argocd app set mirror-web --helm-set image.tag=${{ github.ref_name }}
      #   - flux reconcile helmrelease mirror-web --with-source
      #   - kubectl set image deployment/mirror-web mirror-web=ghcr.io/.../mirror-web:${{ github.ref_name }}
