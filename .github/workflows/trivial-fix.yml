name: "Agent: Trivial Fixes"

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  trivial:
    # Skip PRs managed by the convergence loop to avoid push races.
    if: "!contains(github.event.pull_request.labels.*.name, 'converge')"
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts
        name: Install dependencies (skip native builds)

      - name: Setup — strip agent attribution from commits
        run: |
          mkdir -p .git/hooks
          cat > .git/hooks/prepare-commit-msg << 'HOOK'
          #!/bin/sh
          # Backstop to .claude/settings.json (includeCoAuthoredBy:false): strip any
          # Claude/Anthropic co-author trailer and the "Generated with Claude Code" line.
          sed -i \
            -e '/^Co-authored-by:.*[Aa]nthropic/d' \
            -e '/^Co-authored-by:.*[Cc]laude/d' \
            -e '/Generated with \[Claude Code\]/d' \
            "$1"
          HOOK
          chmod +x .git/hooks/prepare-commit-msg

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions --model claude-haiku-4-5-20251001 --max-turns 20"
          allowed_bots: "claude"
          prompt: |
            Fix TRIVIAL issues only in this PR:
            - Run the project formatter (see AGENTS.md for the command)
            - Fix any lint warnings the project linter flags
            - Fix typos in comments, strings, and doc comments
            - Add missing trailing newlines

            If you make fixes, commit them to this branch with:
            "chore: trivial fixes (auto)"

            Do NOT change logic.
            Do NOT refactor.
            Do NOT add or remove features.
            If nothing to fix, do nothing and exit.
