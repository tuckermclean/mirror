name: "Agent: Converge PR"

# Triggered when a PR labeled `converge` is marked ready for review,
# or when the `converge` label is added to an already-ready PR.
# Also available as a manual re-arm via workflow_dispatch.
#
# The loop: Review → Check CI → Decide → Fix, up to 3 rounds.
# R1 fixes 🔴 blockers + 🟡 suggestions.
# R2-R3 fix 🔴 blockers only.
# 💭 nits are never fixed — they become a follow-up `agent-work` issue.
# Stops (with approval) on 0 blockers + CI green, or (with escalation)
# on 3-round cap or no-progress (same blockers two rounds running).

on:
  pull_request:
    types: [ready_for_review, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to converge"
        required: true
        type: string

concurrency:
  group: "converge-pr-${{ github.event.pull_request.number || inputs.pr_number }}"
  cancel-in-progress: false

jobs:
  # Idempotency guard. The reconciler (agent-reconciler.yml) re-arms converge via
  # workflow_dispatch whenever it sees no converge running and no terminal label —
  # which can fire while a cap-reached fix is still in flight. Without this gate a
  # re-armed run re-reviews (and could falsely re-escalate) a PR a prior run already
  # finished. A run-step `exit 0` cannot stop a job, so the skip is a separate job
  # the converge job depends on.
  gate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          PROCEED=true
          if [ -n "$PR_NUMBER" ]; then
            PR_STATE=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
              --json state --jq '.state' 2>/dev/null || echo "")
            LABELS=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
              --json labels --jq '.labels[].name' 2>/dev/null || echo "")
            echo "PR #$PR_NUMBER state=${PR_STATE:-?} labels=$(echo "$LABELS" | paste -sd, -)"
            # Closed/merged → skip. Empty (read failed) → fail open and let it run.
            [ "$PR_STATE" = "OPEN" ] || { [ -n "$PR_STATE" ] && PROCEED=false; }
            # Already escalated or approved by a prior run → skip.
            echo "$LABELS" | grep -qE '^(needs-human|agent:ready)$' && PROCEED=false
          fi
          [ "$PROCEED" = "true" ] || echo "PR already terminal — skipping converge."
          echo "proceed=$PROCEED" >> "$GITHUB_OUTPUT"

  converge:
    needs: gate
    # PR events: must be non-draft and carry the `converge` label.
    # workflow_dispatch: always runs (caller is responsible for correct PR).
    # In all cases, the gate job must not have flagged the PR as already terminal.
    if: |
      needs.gate.outputs.proceed == 'true' && (
        github.event_name == 'workflow_dispatch' || (
          github.event.pull_request.draft == false && (
            (github.event.action == 'ready_for_review' && contains(github.event.pull_request.labels.*.name, 'converge')) ||
            (github.event.action == 'labeled' && github.event.label.name == 'converge')
          )
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || '' }}
          # Bot token so agent/converge pushes carry a non-Actions identity,
          # which makes GitHub fire pull_request:synchronize and attach CI runs
          # as real PR checks (the default GITHUB_TOKEN suppresses synchronize).
          token: ${{ secrets.GH_BOT_TOKEN || github.token }}

      - name: Setup — checkout PR branch (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

      - name: Setup — record branch name
        id: branch
        run: echo "name=$(git branch --show-current)" >> $GITHUB_OUTPUT

      - name: Setup — check for protected-path changes
        run: |
          PROTECTED=$(git diff origin/master...HEAD --name-only 2>/dev/null \
            | grep -E '^\.github/workflows/|^ARCHITECTURE\.md|^THREAT_MODEL\.md|^COMPLIANCE\.md' \
            || true)
          if [ -n "$PROTECTED" ]; then
            printf '⚠️ This PR modifies protected paths that require human approval per AGENTS.md:\n\n```\n%s\n```\n\nDo not merge without explicit human review of these changes.\n' \
              "$PROTECTED" > /tmp/protected-comment.md
            gh pr comment "$PR_NUMBER" --body-file /tmp/protected-comment.md
            gh pr edit "$PR_NUMBER" --add-label "needs-human" || true
            echo "Protected paths detected — escalating to human without running review rounds."
            exit 0
          fi

      - name: Setup — clone agents
        run: |
          # Pinned to a reviewed SHA. To update: review the diff at
          # https://github.com/msitarzewski/agency-agents/compare/<old>...<new>
          # then update PINNED_SHA in dispatch.yml, pr-converge.yml, and review.yml.
          PINNED_SHA="d6553e261e595c651064f899a6c33dd5aa71c9e3"
          git clone https://github.com/msitarzewski/agency-agents.git /tmp/agency-agents
          git -C /tmp/agency-agents checkout "$PINNED_SHA"
          find /tmp/agency-agents -mindepth 2 -name "*.md" -exec cp {} .agents/ \;

      - name: Setup — init state files
        run: |
          echo '{"blockers":1,"suggestions":0,"nits":[],"blocker_signatures":["verdict-file-not-written"]}' \
            > .converge-verdict.json
          rm -f .converge-verdict-r1.json .converge-verdict-r2.json .converge-verdict-r3.json
          rm -f .converge-final-action .converge-nits-raw

      # Stage all converge scripts from the trusted default branch so PR code
      # cannot tamper with them, and so they're present even on old branches.
      # strip-attribution is also installed here rather than from the working
      # tree — a PR that modifies it must not get code execution in CI runners.
      - name: "Setup — stage converge scripts"
        run: |
          DEFAULT="${{ github.event.repository.default_branch }}"
          git fetch --depth=1 origin "$DEFAULT" >/dev/null 2>&1 || true

          stage() {
            local name="$1" src="$2" dst="$3" fallback="$4"
            if git show "origin/${DEFAULT}:${src}" > "$dst" 2>/dev/null; then
              echo "${name}: origin/$DEFAULT"
            elif cp "${src}" "$dst" 2>/dev/null; then
              echo "${name}: working tree"
            else
              printf '%s\n' "$fallback" > "$dst"
              echo "${name}: minimal fallback"
            fi
            chmod +x "$dst"
          }

          stage resolve-blockers \
            scripts/converge/resolve-blockers.sh \
            "$RUNNER_TEMP/resolve-blockers.sh" \
            $'#!/usr/bin/env bash\njq -r ".blockers // \"unknown\"" "$1" 2>/dev/null || echo unknown'

          stage decide-round \
            scripts/converge/decide-round.sh \
            "$RUNNER_TEMP/decide-round.sh" \
            $'#!/usr/bin/env bash\necho "fix"'

          stage strip-attribution \
            scripts/git/strip-attribution.sh \
            "$RUNNER_TEMP/strip-attribution.sh" \
            '#!/bin/sh'

      - name: "Setup — strip agent attribution from commits"
        run: bash "$RUNNER_TEMP/strip-attribution.sh" --install

      # ── Round 1 ─────────────────────────────────────────────────────────────

      - name: "R1 — Review"
        id: r1_review
        continue-on-error: true
        timeout-minutes: 40
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions --model claude-sonnet-4-6 --max-turns 50"
          show_full_output: "true"
          allowed_bots: "claude"
          prompt: |
            Load: .agents/custom/converge-reviewer.md
            Also load: .agents/custom/converge-orchestrator.md (severity taxonomy + verdict schema)

            This is ROUND 1 of 3.
            PR_NUMBER=${{ env.PR_NUMBER }}

      - name: "R1 — Save verdict"
        run: |
          cp .converge-verdict.json .converge-verdict-r1.json 2>/dev/null || \
            echo '{"blockers":1,"suggestions":0,"nits":[],"blocker_signatures":["verdict-file-not-written"]}' \
              > .converge-verdict-r1.json

      - name: "R1 — Check CI"
        id: r1_ci
        run: |
          end=$((SECONDS + 480))
          while [ $SECONDS -lt $end ]; do
            PENDING=$(gh pr checks "$PR_NUMBER" --json name,state --jq '
              [ .[]
                | select(.name=="Type Check" or .name=="Lint" or .name=="Integration Tests"
                         or .name=="Docker Build & Scan" or .name=="Helm Lint" or .name=="Helm Kubeconform")
                | select((.state|ascii_downcase) as $s
                         | $s=="pending" or $s=="in_progress" or $s=="queued" or $s=="waiting") ]
              | length' 2>/dev/null || echo 0)
            [ "${PENDING:-0}" = "0" ] && break
            echo "CI pending ($PENDING jobs), waiting…"
            sleep 30
          done
          CHECKS=$(gh pr checks "$PR_NUMBER" --json name,state 2>/dev/null || echo '[]')
          CI_GREEN="true"
          for JOB in "Type Check" "Lint" "Integration Tests" "Docker Build & Scan" "Helm Lint" "Helm Kubeconform"; do
            STATE=$(echo "$CHECKS" | jq -r --arg n "$JOB" \
              '.[] | select(.name == $n) | .state // "missing"' \
              | head -1 | tr '[:upper:]' '[:lower:]')
            if [ "$STATE" != "success" ] && [ "$STATE" != "skipped" ] && [ "$STATE" != "neutral" ]; then
              CI_GREEN="false"
              echo "Blocking check '$JOB' not green: ${STATE:-missing}"
            fi
          done
          echo "ci_green=$CI_GREEN" >> $GITHUB_OUTPUT

      - name: "R1 — Decide"
        id: r1_decide
        run: |
          BLOCKERS=$(bash "$RUNNER_TEMP/resolve-blockers.sh" .converge-verdict-r1.json "$PR_NUMBER")
          NITS=$(jq -c '.nits // []' .converge-verdict-r1.json 2>/dev/null || echo "[]")
          CURR_SIGS=$(jq -c '(.blocker_signatures // []) | sort' .converge-verdict-r1.json 2>/dev/null || echo "[]")
          echo "$NITS" >> .converge-nits-raw
          ACTION=$(ROUND=1 BLOCKERS="$BLOCKERS" CI_GREEN="${{ steps.r1_ci.outputs.ci_green }}" \
            PREV_SIGS="[]" CURR_SIGS="$CURR_SIGS" \
            bash "$RUNNER_TEMP/decide-round.sh")
          if [ "$ACTION" = "approve" ]; then
            echo "done=true" >> $GITHUB_OUTPUT
            echo "$ACTION" > .converge-final-action
            echo "Converged after round 1."
          else
            echo "done=false" >> $GITHUB_OUTPUT
            echo "Blockers: $BLOCKERS, CI green: ${{ steps.r1_ci.outputs.ci_green }} — proceeding to fix."
          fi

      - name: "R1 — Fix (🔴 blockers + 🟡 suggestions)"
        if: steps.r1_decide.outputs.done != 'true'
        continue-on-error: true
        timeout-minutes: 60
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions --model claude-sonnet-4-6 --max-turns 60"
          show_full_output: "true"
          allowed_bots: "claude"
          prompt: |
            Load: .agents/custom/converge-fixer.md
            Also load: .agents/custom/converge-orchestrator.md

            This is ROUND 1 of 3 — fix mode. Fix ALL 🔴 blockers AND ALL 🟡 suggestions.
            Branch: ${{ steps.branch.outputs.name }}
            PR_NUMBER=${{ env.PR_NUMBER }}

      # ── Round 2 ─────────────────────────────────────────────────────────────

      - name: "R2 — Reset verdict sentinel"
        if: steps.r1_decide.outputs.done != 'true'
        run: |
          echo '{"blockers":1,"suggestions":0,"nits":[],"blocker_signatures":["verdict-file-not-written"]}' \
            > .converge-verdict.json

      - name: "R2 — Review"
        id: r2_review
        if: steps.r1_decide.outputs.done != 'true'
        continue-on-error: true
        timeout-minutes: 40
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions --model claude-sonnet-4-6 --max-turns 50"
          show_full_output: "true"
          allowed_bots: "claude"
          prompt: |
            Load: .agents/custom/converge-reviewer.md
            Also load: .agents/custom/converge-orchestrator.md (severity taxonomy + verdict schema)

            This is ROUND 2 of 3.
            PR_NUMBER=${{ env.PR_NUMBER }}
            Compare with .converge-verdict-r1.json to track what was fixed vs. still open.

      - name: "R2 — Save verdict"
        if: steps.r1_decide.outputs.done != 'true'
        run: |
          cp .converge-verdict.json .converge-verdict-r2.json 2>/dev/null || \
            cp .converge-verdict-r1.json .converge-verdict-r2.json

      - name: "R2 — Check CI"
        id: r2_ci
        if: steps.r1_decide.outputs.done != 'true'
        run: |
          end=$((SECONDS + 480))
          while [ $SECONDS -lt $end ]; do
            PENDING=$(gh pr checks "$PR_NUMBER" --json name,state --jq '
              [ .[]
                | select(.name=="Type Check" or .name=="Lint" or .name=="Integration Tests"
                         or .name=="Docker Build & Scan" or .name=="Helm Lint" or .name=="Helm Kubeconform")
                | select((.state|ascii_downcase) as $s
                         | $s=="pending" or $s=="in_progress" or $s=="queued" or $s=="waiting") ]
              | length' 2>/dev/null || echo 0)
            [ "${PENDING:-0}" = "0" ] && break
            echo "CI pending ($PENDING jobs), waiting…"
            sleep 30
          done
          CHECKS=$(gh pr checks "$PR_NUMBER" --json name,state 2>/dev/null || echo '[]')
          CI_GREEN="true"
          for JOB in "Type Check" "Lint" "Integration Tests" "Docker Build & Scan" "Helm Lint" "Helm Kubeconform"; do
            STATE=$(echo "$CHECKS" | jq -r --arg n "$JOB" \
              '.[] | select(.name == $n) | .state // "missing"' \
              | head -1 | tr '[:upper:]' '[:lower:]')
            if [ "$STATE" != "success" ] && [ "$STATE" != "skipped" ] && [ "$STATE" != "neutral" ]; then
              CI_GREEN="false"
              echo "Blocking check '$JOB' not green: ${STATE:-missing}"
            fi
          done
          echo "ci_green=$CI_GREEN" >> $GITHUB_OUTPUT

      - name: "R2 — Decide"
        id: r2_decide
        if: steps.r1_decide.outputs.done != 'true'
        run: |
          BLOCKERS=$(bash "$RUNNER_TEMP/resolve-blockers.sh" .converge-verdict-r2.json "$PR_NUMBER")
          NITS=$(jq -c '.nits // []' .converge-verdict-r2.json 2>/dev/null || echo "[]")
          PREV_SIGS=$(jq -c '(.blocker_signatures // []) | sort' .converge-verdict-r1.json 2>/dev/null || echo "[]")
          CURR_SIGS=$(jq -c '(.blocker_signatures // []) | sort' .converge-verdict-r2.json 2>/dev/null || echo "[]")
          echo "$NITS" >> .converge-nits-raw
          ACTION=$(ROUND=2 BLOCKERS="$BLOCKERS" CI_GREEN="${{ steps.r2_ci.outputs.ci_green }}" \
            PREV_SIGS="$PREV_SIGS" CURR_SIGS="$CURR_SIGS" \
            bash "$RUNNER_TEMP/decide-round.sh")
          if [ "$ACTION" = "approve" ]; then
            echo "done=true" >> $GITHUB_OUTPUT
            echo "$ACTION" > .converge-final-action
            echo "Converged after round 2."
          elif [ "$ACTION" != "fix" ]; then
            echo "done=true" >> $GITHUB_OUTPUT
            echo "$ACTION" > .converge-final-action
            echo "Escalating after round 2: $ACTION"
          else
            echo "done=false" >> $GITHUB_OUTPUT
            echo "Blockers: $BLOCKERS, CI green: ${{ steps.r2_ci.outputs.ci_green }} — proceeding to round 2 fix."
          fi

      - name: "R2 — Fix (🔴 blockers only)"
        if: steps.r1_decide.outputs.done != 'true' && steps.r2_decide.outputs.done != 'true'
        continue-on-error: true
        timeout-minutes: 60
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions --model claude-sonnet-4-6 --max-turns 60"
          show_full_output: "true"
          allowed_bots: "claude"
          prompt: |
            Load: .agents/custom/converge-fixer.md
            Also load: .agents/custom/converge-orchestrator.md

            This is ROUND 2 of 3 — fix mode. Fix ONLY 🔴 blockers.
            Branch: ${{ steps.branch.outputs.name }}
            PR_NUMBER=${{ env.PR_NUMBER }}

      # ── Round 3 ─────────────────────────────────────────────────────────────

      - name: "R3 — Reset verdict sentinel"
        if: steps.r1_decide.outputs.done != 'true' && steps.r2_decide.outputs.done != 'true'
        run: |
          echo '{"blockers":1,"suggestions":0,"nits":[],"blocker_signatures":["verdict-file-not-written"]}' \
            > .converge-verdict.json

      - name: "R3 — Review"
        id: r3_review
        if: steps.r1_decide.outputs.done != 'true' && steps.r2_decide.outputs.done != 'true'
        continue-on-error: true
        timeout-minutes: 40
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions --model claude-sonnet-4-6 --max-turns 50"
          show_full_output: "true"
          allowed_bots: "claude"
          prompt: |
            Load: .agents/custom/converge-reviewer.md
            Also load: .agents/custom/converge-orchestrator.md (severity taxonomy + verdict schema)

            This is ROUND 3 of 3 (final round — no fix step after this).
            PR_NUMBER=${{ env.PR_NUMBER }}
            Compare with .converge-verdict-r2.json to track progress.

      - name: "R3 — Save verdict"
        if: steps.r1_decide.outputs.done != 'true' && steps.r2_decide.outputs.done != 'true'
        run: |
          cp .converge-verdict.json .converge-verdict-r3.json 2>/dev/null || \
            cp .converge-verdict-r2.json .converge-verdict-r3.json

      - name: "R3 — Check CI"
        id: r3_ci
        if: steps.r1_decide.outputs.done != 'true' && steps.r2_decide.outputs.done != 'true'
        run: |
          end=$((SECONDS + 480))
          while [ $SECONDS -lt $end ]; do
            PENDING=$(gh pr checks "$PR_NUMBER" --json name,state --jq '
              [ .[]
                | select(.name=="Type Check" or .name=="Lint" or .name=="Integration Tests"
                         or .name=="Docker Build & Scan" or .name=="Helm Lint" or .name=="Helm Kubeconform")
                | select((.state|ascii_downcase) as $s
                         | $s=="pending" or $s=="in_progress" or $s=="queued" or $s=="waiting") ]
              | length' 2>/dev/null || echo 0)
            [ "${PENDING:-0}" = "0" ] && break
            echo "CI pending ($PENDING jobs), waiting…"
            sleep 30
          done
          CHECKS=$(gh pr checks "$PR_NUMBER" --json name,state 2>/dev/null || echo '[]')
          CI_GREEN="true"
          for JOB in "Type Check" "Lint" "Integration Tests" "Docker Build & Scan" "Helm Lint" "Helm Kubeconform"; do
            STATE=$(echo "$CHECKS" | jq -r --arg n "$JOB" \
              '.[] | select(.name == $n) | .state // "missing"' \
              | head -1 | tr '[:upper:]' '[:lower:]')
            if [ "$STATE" != "success" ] && [ "$STATE" != "skipped" ] && [ "$STATE" != "neutral" ]; then
              CI_GREEN="false"
              echo "Blocking check '$JOB' not green: ${STATE:-missing}"
            fi
          done
          echo "ci_green=$CI_GREEN" >> $GITHUB_OUTPUT

      - name: "R3 — Decide (final round, no fix step)"
        id: r3_decide
        if: steps.r1_decide.outputs.done != 'true' && steps.r2_decide.outputs.done != 'true'
        run: |
          BLOCKERS=$(bash "$RUNNER_TEMP/resolve-blockers.sh" .converge-verdict-r3.json "$PR_NUMBER")
          NITS=$(jq -c '.nits // []' .converge-verdict-r3.json 2>/dev/null || echo "[]")
          PREV_SIGS=$(jq -c '(.blocker_signatures // []) | sort' .converge-verdict-r2.json 2>/dev/null || echo "[]")
          CURR_SIGS=$(jq -c '(.blocker_signatures // []) | sort' .converge-verdict-r3.json 2>/dev/null || echo "[]")
          echo "$NITS" >> .converge-nits-raw
          ACTION=$(ROUND=3 BLOCKERS="$BLOCKERS" CI_GREEN="${{ steps.r3_ci.outputs.ci_green }}" \
            PREV_SIGS="$PREV_SIGS" CURR_SIGS="$CURR_SIGS" \
            bash "$RUNNER_TEMP/decide-round.sh")
          echo "$ACTION" > .converge-final-action
          echo "Round 3 decision: $ACTION"

      # ── Finalize ────────────────────────────────────────────────────────────

      - name: "Finalize — Approve or escalate + open deferred issue"
        if: always()
        run: |
          # A missing action file means no verdict was produced — not that
          # blockers remain. Default to the honest "no-verdict" escalation.
          FINAL_ACTION=$(cat .converge-final-action 2>/dev/null || echo "escalate:no-verdict")

          # Collect deferred nits from all rounds (deduplicated)
          DEFERRED_NITS=""
          if [ -f .converge-nits-raw ]; then
            DEFERRED_NITS=$(cat .converge-nits-raw \
              | jq -s '[.[] | if type == "array" then .[] else . end] | unique | .[]' -r \
              2>/dev/null | sed 's/^/- /' || true)
          fi

          ROUNDS=0
          [ -f .converge-verdict-r1.json ] && ROUNDS=1
          [ -f .converge-verdict-r2.json ] && ROUNDS=2
          [ -f .converge-verdict-r3.json ] && ROUNDS=3

          if [ "$FINAL_ACTION" = "approve" ]; then
            gh pr review "$PR_NUMBER" --approve \
              --body "Converged in $ROUNDS round(s) — all blockers resolved and CI green."
            gh pr edit "$PR_NUMBER" --add-label "agent:ready" --remove-label "converge" 2>/dev/null || true
            SUMMARY="Converged — approved after $ROUNDS round(s). Ready for human merge."
          else
            REASON="${FINAL_ACTION#escalate:}"
            case "$REASON" in
              no-progress)
                # Same real blocker signatures two consecutive rounds running —
                # genuine human decision. (The init sentinel — "reviewer wrote no
                # verdict" — is normalized away in decide-round.sh and never lands here.)
                gh pr edit "$PR_NUMBER" --add-label "needs-human" || true
                SUMMARY="Escalated to human — same blockers across two consecutive rounds; fixer is stuck. Reviewed $ROUNDS round(s)."
                ;;
              no-verdict)
                # Reviewer exhausted turns without writing a machine verdict — likely a
                # turn-limit timeout, not genuine blockers. Auto-retry up to 2 times before
                # escalating so a flaky reviewer doesn't permanently stall a clean PR.
                RETRY_COUNT=$(gh pr view "$PR_NUMBER" --json comments \
                  --jq '[.comments[] | select(.body | contains("<!-- converge-no-verdict-retry -->"))] | length' \
                  2>/dev/null || echo "0")
                if [ "$RETRY_COUNT" -lt 2 ]; then
                  printf '<!-- converge-no-verdict-retry -->\n🔄 Reviewer hit turn limit (no machine verdict). Re-arming **full converge from round 1** (retry %d/2) — this starts a new convergence loop, not just a re-run of the final step.\n' \
                    "$((RETRY_COUNT + 1))" > /tmp/no-verdict-retry.md
                  gh pr comment "$PR_NUMBER" --body-file /tmp/no-verdict-retry.md || true
                  gh workflow run pr-converge.yml \
                    --repo "$GITHUB_REPOSITORY" \
                    --field pr_number="$PR_NUMBER" 2>/dev/null || true
                  SUMMARY="no-verdict auto-retry $((RETRY_COUNT + 1))/2 — re-armed converge. Reviewed $ROUNDS round(s)."
                else
                  gh pr edit "$PR_NUMBER" --add-label "needs-human" || true
                  SUMMARY="Escalated to human — final review left no machine-readable verdict after 2 retries. Confirm and merge if CI is green. Reviewed $ROUNDS round(s)."
                fi
                ;;
              ci-red)
                # Code-review blockers are gone but CI is not green. This is a mechanical
                # issue (push-trigger gap), not a human decision. Re-trigger CI and wait.
                BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName' 2>/dev/null || echo "")
                if [ -n "$BRANCH" ]; then
                  echo "Blockers cleared but CI not green — re-triggering CI on $BRANCH and waiting up to 8 min…"
                  gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$BRANCH" 2>/dev/null || true
                  sleep 480
                  RECHK=$(gh pr checks "$PR_NUMBER" --json name,state 2>/dev/null || echo '[]')
                  STILL_RED=$(echo "$RECHK" | jq -r \
                    '.[] | select(.name == "Type Check" or .name == "Lint" or .name == "Integration Tests") | .state' \
                    | tr '[:upper:]' '[:lower:]' \
                    | grep -cvE "^(success|skipped|neutral)$" || echo "3")
                  if [ "$STILL_RED" = "0" ]; then
                    gh pr review "$PR_NUMBER" --approve \
                      --body "CI recovered after re-trigger — all checks green. Converged in $ROUNDS round(s)."
                    gh pr edit "$PR_NUMBER" --add-label "agent:ready" --remove-label "converge" 2>/dev/null || true
                    SUMMARY="Converged — approved after CI re-trigger. Ready for human merge."
                  else
                    gh pr edit "$PR_NUMBER" --add-label "needs-human" || true
                    SUMMARY="Escalated to human — CI still red after re-trigger. Blockers were code-review-clear. Reviewed $ROUNDS round(s)."
                  fi
                else
                  gh pr edit "$PR_NUMBER" --add-label "needs-human" || true
                  SUMMARY="Escalated to human — CI not green and could not determine branch name to re-trigger."
                fi
                ;;
              cap-reached)
                # 3-round cap with remaining blockers. Not needs-human yet — re-dispatch the
                # implementing agent with a targeted fix prompt. The reconciler tracks retry count.
                ISSUE_NUM=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null \
                  | grep -oE '(Closes|Fixes|Resolves) #[0-9]+' | head -1 | grep -oE '[0-9]+' || echo "")
                if [ -n "$ISSUE_NUM" ]; then
                  REMAINING=$(jq -r '.blockers // "unknown"' .converge-verdict-r3.json 2>/dev/null || echo "unknown")
                  printf '@claude The 3-round convergence cap was reached on PR #%s with %s blocker(s) still open.\n\nReview the latest review comment on that PR for the specific findings, fix them, run `pnpm typecheck && pnpm lint` to confirm they pass, then call `gh pr ready %s`.\n' \
                    "$PR_NUMBER" "$REMAINING" "$PR_NUMBER" > /tmp/redispatch-comment.md
                  # Use bot token so the @claude comment triggers dispatch.yml
                  # (the Actions token cannot fire issue_comment workflow events).
                  GH_TOKEN="${{ secrets.GH_BOT_TOKEN || github.token }}" gh issue comment "$ISSUE_NUM" --body-file /tmp/redispatch-comment.md || true
                  gh issue edit "$ISSUE_NUM" --add-label "agent-work" 2>/dev/null || true
                  SUMMARY="Cap reached — re-dispatched implementing agent to fix $REMAINING remaining blocker(s). Reviewed $ROUNDS round(s)."
                else
                  gh pr edit "$PR_NUMBER" --add-label "needs-human" || true
                  SUMMARY="Escalated to human — 3-round cap reached with blockers open; could not find original issue to re-dispatch. Reviewed $ROUNDS round(s)."
                fi
                ;;
              *)
                gh pr edit "$PR_NUMBER" --add-label "needs-human" || true
                SUMMARY="Escalated to human — $REASON. Reviewed $ROUNDS round(s)."
                ;;
            esac
          fi

          # Open deferred-nits issue if there is anything to defer
          ISSUE_LINK=""
          if [ -n "$DEFERRED_NITS" ]; then
            printf '## Deferred from PR #%s\n\n' "$PR_NUMBER" > /tmp/deferred-issue-body.md
            printf 'These items were identified during the PR convergence loop but deferred\n' >> /tmp/deferred-issue-body.md
            printf 'because they are nits or suggestions after round 1.\n' >> /tmp/deferred-issue-body.md
            printf 'They do not block the merge but should be addressed.\n\n' >> /tmp/deferred-issue-body.md
            printf '%s\n\n---\n' "$DEFERRED_NITS" >> /tmp/deferred-issue-body.md
            printf '_Automatically opened by the convergence loop from PR #%s._\n' "$PR_NUMBER" >> /tmp/deferred-issue-body.md
            ISSUE_URL=$(gh issue create \
              --title "Deferred polish from PR #${PR_NUMBER}" \
              --body-file /tmp/deferred-issue-body.md \
              --label "polish" 2>/dev/null | tail -1 || echo "")
            [ -n "$ISSUE_URL" ] && ISSUE_LINK=" Deferred items: $ISSUE_URL"
          fi

          printf '%s%s\n\n> Convergence loop complete — %s round(s) run.\n' \
            "$SUMMARY" "$ISSUE_LINK" "$ROUNDS" \
            > /tmp/final-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/final-comment.md
