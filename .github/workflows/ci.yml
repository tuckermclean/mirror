name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Manual dispatch: used to re-trigger CI on a branch whose HEAD has no check-runs
  # (happens when the converge loop pushes via github.token, which GitHub intentionally
  # does not fire pull_request:synchronize events for — preventing recursive loops).
  # Long-term fix: swap converge-loop pushes to a GitHub App token so the synchronize
  # event fires automatically. Until then, `gh workflow run ci.yml --ref <branch>`.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mirror-web

jobs:
  # ── 1. Type-check ────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with: { run_install: false }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with: { node-version-file: package.json, cache: pnpm }
      - run: make install
      - run: make typecheck

  # ── 2. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with: { run_install: false }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with: { node-version-file: package.json, cache: pnpm }
      - run: make install
      - run: make lint

  # ── 3. Unit tests ────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with: { run_install: false }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with: { node-version-file: package.json, cache: pnpm }
      - run: make install
      # Unit tests for Wk 2+ modules (voice-card, crypto, parsers) are
      # intentionally RED until their implementations land. Run them so
      # failures are visible but don't block the CI check.
      - run: make test-unit
        continue-on-error: true

  # ── 4. Integration tests ─────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mirror
          POSTGRES_PASSWORD: mirror
          POSTGRES_DB: mirror_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://mirror:mirror@localhost:5432/mirror_test
      R2_ENDPOINT: https://placeholder.r2.cloudflarestorage.com
      R2_ACCESS_KEY_ID: placeholder
      R2_SECRET_ACCESS_KEY: placeholder
      R2_BUCKET_NAME: placeholder-bucket
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with: { run_install: false }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with: { node-version-file: package.json, cache: pnpm }
      - run: make install
      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
      - name: Run migrations
        run: pnpm drizzle-kit push --force
      # Run the db + health suites against the live DB+pgvector. The health
      # suite is wired in here for #15: the readiness probe must be verified
      # against a real DB in the gating job, not only by mocked unit tests.
      # rag/retrieval is still Wk 4 RED, so it stays excluded.
      - run: make test-integration

  # ── 5. E2E tests ─────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Requires CLERK_SECRET_KEY — continues without blocking until keys are set
    continue-on-error: true
    needs: [typecheck, lint, unit]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mirror
          POSTGRES_PASSWORD: mirror
          POSTGRES_DB: mirror_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://mirror:mirror@localhost:5432/mirror_e2e
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLERK_TEST_USER_EMAIL: ${{ secrets.CLERK_TEST_USER_EMAIL }}
      CLERK_TEST_USER_PASSWORD: ${{ secrets.CLERK_TEST_USER_PASSWORD }}
      R2_ENDPOINT: https://placeholder.r2.cloudflarestorage.com
      R2_ACCESS_KEY_ID: placeholder
      R2_SECRET_ACCESS_KEY: placeholder
      R2_BUCKET_NAME: placeholder-bucket
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with: { run_install: false }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with: { node-version-file: package.json, cache: pnpm }
      - run: make install
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
      - run: make build
      - name: Enable pgvector extension
        if: env.CLERK_SECRET_KEY != '' && env.ANTHROPIC_API_KEY != ''
        run: psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
      - name: Run migrations
        if: env.CLERK_SECRET_KEY != '' && env.ANTHROPIC_API_KEY != ''
        run: pnpm drizzle-kit push --force
      - name: Start app and wait for readiness
        if: env.CLERK_SECRET_KEY != '' && env.ANTHROPIC_API_KEY != ''
        run: |
          # next.config.ts uses output:"standalone" — must use standalone server,
          # not `next start` (which warns and may not handle middleware correctly).
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          node .next/standalone/server.js &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> "$GITHUB_ENV"
          # Wait up to 60 seconds for the server to be ready
          timeout 60 bash -c 'until curl -sf http://localhost:3000/api/health/ready; do sleep 2; done'
      # Wk 1 scope: auth + interview. Wk 2+ specs (import, linkedin, walkthrough,
      # commit) are RED by design and excluded from this job.
      - name: Run E2E tests (Wk 1 scope)
        if: env.CLERK_SECRET_KEY != '' && env.ANTHROPIC_API_KEY != ''
        run: pnpm exec playwright test tests/e2e/auth.spec.ts tests/e2e/interview.spec.ts
      - name: Upload Playwright report
        if: always() && env.CLERK_SECRET_KEY != '' && env.ANTHROPIC_API_KEY != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── 6. Docker build ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit, integration]
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-ref: ${{ steps.build.outputs.imageid }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
      - name: Build image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          # Only push on pushes to master; on PRs we load locally for scanning
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          load: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            R2_ENDPOINT=https://placeholder.r2.cloudflarestorage.com
            R2_ACCESS_KEY_ID=placeholder
            R2_SECRET_ACCESS_KEY=placeholder
            R2_BUCKET_NAME=placeholder-bucket
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Check image size
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          # On push-to-master the image is pushed but not loaded locally; pull it back.
          # On PRs the image is loaded (not pushed), so inspect works immediately.
          docker image inspect "$IMAGE_TAG" > /dev/null 2>&1 || docker pull "$IMAGE_TAG"
          SIZE_BYTES=$(docker image inspect "$IMAGE_TAG" --format='{{.Size}}')
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "Image size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 250 ]; then
            echo "ERROR: Image size ${SIZE_MB} MB exceeds 250 MB limit"
            exit 1
          fi
      - name: Run Trivy vulnerability scan
        # continue-on-error so a CVE finding doesn't gate the build; findings
        # are still uploaded to GitHub Security for review and remediation.
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
      - name: Upload Trivy SARIF results
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@f52b05f4acaaa234e44466e66d29050e135ea9ef  # v4.36.0
        with:
          sarif_file: trivy-results.sarif

  # ── 7. Helm lint ─────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with: { version: v3.17.0 }
      - run: make helm-lint

  # ── 8. Helm kubeconform ──────────────────────────────────────────────────────
  helm-kubeconform:
    name: Helm Kubeconform
    runs-on: ubuntu-latest
    needs: helm-lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with: { version: v3.17.0 }
      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION=v0.7.0
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz -C /usr/local/bin kubeconform
          chmod +x /usr/local/bin/kubeconform
      - run: make helm-kubeconform

  # ── 9. Prompt evals (gated on secret availability) ──────────────────────────
  prompt-eval:
    name: Prompt Evals
    runs-on: ubuntu-latest
    needs: [unit, integration]
    # secrets context is unavailable in job-level if; expose it as an env var
    # and gate at the step level instead.
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with: { run_install: false }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with: { node-version-file: package.json, cache: pnpm }
      - run: make install
      - name: Run prompt evals
        if: env.ANTHROPIC_API_KEY != ''
        run: make eval-prompts
