name: "Agent: Review PR"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'CHANGELOG*'

jobs:
  review:
    # Skip PRs managed by the convergence loop — it runs the reviewer itself.
    if: github.event.pull_request.draft == false && !contains(github.event.pull_request.labels.*.name, 'converge')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with: { fetch-depth: 0 }

      - name: Setup agents
        run: |
          git clone --depth 1 https://github.com/msitarzewski/agency-agents.git /tmp/agency-agents
          # Supply-chain guard: fail loudly if upstream changed without our review.
          # To update: verify the diff, then change PINNED_SHA in dispatch.yml,
          # pr-converge.yml, and review.yml.
          ACTUAL_SHA=$(git -C /tmp/agency-agents rev-parse HEAD)
          PINNED_SHA="4e905cff59e3e3e5b5566d410b2b49e9ab22ecb0"
          if [ "$ACTUAL_SHA" != "$PINNED_SHA" ]; then
            echo "::error::agency-agents SHA mismatch! Expected $PINNED_SHA, got $ACTUAL_SHA"
            echo "::error::Review: https://github.com/msitarzewski/agency-agents/compare/${PINNED_SHA:0:7}...${ACTUAL_SHA:0:7}"
            echo "::error::If safe, update PINNED_SHA in dispatch.yml, pr-converge.yml, review.yml"
            exit 1
          fi
          find /tmp/agency-agents -mindepth 2 -name "*.md" -exec cp {} .agents/ \;

      - uses: anthropics/claude-code-action@v1
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions --model claude-sonnet-4-6 --max-turns 20"
          allowed_bots: "claude"
          prompt: |
            Review this PR (number ${{ github.event.pull_request.number }}) using:
            .agents/engineering-code-reviewer.md

            DELIVERABLE — DO THIS FIRST, BEFORE deep analysis:
            Post an initial review comment so your work is never lost if you run
            out of turns:
              gh pr comment ${{ github.event.pull_request.number }} --body "🤖 Review in progress…"
            Then, as you find issues, rewrite that same comment with your findings
            using:
              gh pr comment ${{ github.event.pull_request.number }} --edit-last --body "..."
            Keep it current so a partial review is still useful. Your FINAL action
            MUST be the complete review posted via gh pr comment — never rely on
            your closing chat text, which is discarded if you run out of turns.

            Consult a specialist ONLY if the diff actually touches that area, and
            read at most ONE specialist file (skip entirely for small diffs):
            - auth/session/crypto/permission/rbac → .agents/engineering-security-engineer.md
            - migrations/*.sql/schema → .agents/engineering-database-optimizer.md
            - *.tsx/*.css/components/ui → .agents/testing-accessibility-auditor.md
            - api/routes/handlers → .agents/testing-api-tester.md

            Check:
            1. AGENTS.md compliance
            2. Test coverage on new public functions
            3. Error handling and edge cases
            4. Security issues (always, not just flagged files)
            5. Idiomatic style for the language
            6. Accessibility on any UI changes

            Be specific. Cite line numbers.
            Approve when genuinely good. Request changes when warranted.
            Do NOT nitpick style the formatter handles.
