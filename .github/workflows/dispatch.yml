name: "Dispatch: Orchestrate with specialists"

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  execute:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'agent-work') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    timeout-minutes: 130

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          # Bot token so agent pushes carry a non-Actions identity, firing
          # pull_request:synchronize and attaching CI as real PR checks.
          token: ${{ secrets.GH_BOT_TOKEN || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: make install

      - name: Setup agents
        run: |
          # Pinned to a reviewed SHA. To update: review the diff at
          # https://github.com/msitarzewski/agency-agents/compare/<old>...<new>
          # then update PINNED_SHA in dispatch.yml, pr-converge.yml, and review.yml.
          PINNED_SHA="d6553e261e595c651064f899a6c33dd5aa71c9e3"
          git clone https://github.com/msitarzewski/agency-agents.git /tmp/agency-agents
          git -C /tmp/agency-agents checkout "$PINNED_SHA"
          find /tmp/agency-agents -mindepth 2 -name "*.md" -exec cp {} .agents/ \;

      - name: Setup — strip agent attribution from commits
        run: |
          DEFAULT="${{ github.event.repository.default_branch }}"
          git fetch --depth=1 origin "$DEFAULT" >/dev/null 2>&1 || true
          STRIP="$RUNNER_TEMP/strip-attribution.sh"
          if git show "origin/${DEFAULT}:scripts/git/strip-attribution.sh" > "$STRIP" 2>/dev/null; then
            echo "strip-attribution: origin/$DEFAULT"
          else
            printf '%s\n' '#!/bin/sh' > "$STRIP"
            echo "strip-attribution: minimal fallback (no-op)"
          fi
          chmod +x "$STRIP"
          bash "$STRIP" --install

      # ── Entry routing — deterministic, zero-API-key ──────────────────────────
      # decide-entry.sh maps the GitHub event name to model/turns/contract.
      # Replaces the former Haiku LLM dispatcher job.
      # Tested in tests/infra/dispatch-decide-entry.test.ts.
      - name: Decide entry parameters
        id: entry
        run: |
          eval "$(bash scripts/dispatch/decide-entry.sh "${{ github.event_name }}")"
          echo "model=${model}"         >> $GITHUB_OUTPUT
          echo "max_turns=${max_turns}" >> $GITHUB_OUTPUT
          echo "contract=${contract}"   >> $GITHUB_OUTPUT

      - name: Post orchestration notice
        uses: actions/github-script@v7
        with:
          script: |
            const m  = '${{ steps.entry.outputs.model }}';
            const model = m.includes('haiku') ? 'haiku' : m.includes('opus') ? 'opus' : 'sonnet';
            const num = context.issue?.number || context.payload.issue?.number;
            if (num) await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: num,
              body: `🐙 Orchestrating on \`${model}\` — spinning up specialists...`
            });

      - name: Find existing PR for issue
        id: existing_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fast path: if the event is a comment on a PR, use that PR's branch directly.
          # issue_comment on a PR sets issue.number to the PR number;
          # pull_request_review_comment sets pull_request.number.
          PR_FROM_COMMENT=$(gh pr view \
            "${{ github.event.pull_request.number || github.event.issue.number }}" \
            --json headRefName,state \
            --jq 'select(.state == "OPEN") | .headRefName' 2>/dev/null || echo "")

          ISSUE_NUM="${{ github.event.issue.number }}"
          BRANCH=""

          if [ -n "$PR_FROM_COMMENT" ]; then
            # Comment was on a PR — work on that PR's branch
            BRANCH="$PR_FROM_COMMENT"
            echo "Comment on PR branch: $BRANCH"
          elif [ -n "$ISSUE_NUM" ]; then
            # Comment on an issue — search for a PR that closes it
            BRANCH=$(gh pr list --state open --json headRefName,body \
              --jq ".[] | select(.body | test(\"(Closes|closes|Fixes|fixes|Resolves|resolves) #${ISSUE_NUM}\")) | .headRefName" \
              2>/dev/null | head -1)
            # Fallback: check the issue timeline for cross-referenced PRs
            if [ -z "$BRANCH" ]; then
              PR_NUM=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUM}/timeline" \
                --jq '[.[] | select(.event == "cross-referenced") | select(.source.issue.pull_request != null) | .source.issue.number] | last' \
                2>/dev/null || echo "")
              if [ -n "$PR_NUM" ] && [ "$PR_NUM" != "null" ]; then
                BRANCH=$(gh pr view "$PR_NUM" --json headRefName,state \
                  --jq 'select(.state == "OPEN") | .headRefName' 2>/dev/null || echo "")
              fi
            fi
          fi

          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          [ -n "$BRANCH" ] && echo "Existing PR branch: $BRANCH" || echo "No existing open PR found"

      - uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions --model ${{ steps.entry.outputs.model }} --max-turns ${{ steps.entry.outputs.max_turns }}"
          show_full_output: "true"
          prompt: |
            Load and follow: ${{ steps.entry.outputs.contract }}
            Follow ALL rules in AGENTS.md.

            EVENT: ${{ github.event_name }}
            ISSUE NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
            EXISTING BRANCH: ${{ steps.existing_pr.outputs.branch }}
            TITLE: ${{ github.event.issue.title || github.event.pull_request.title || '' }}
            ISSUE BODY: ${{ github.event.issue.body || '' }}
            COMMENT: ${{ github.event.comment.body || '' }}

            If COMMENT is non-empty, that is the specific request to fulfill — use ISSUE BODY as background only.

      # ── Tag PR as agent:implementing and ensure converge label ───────────────
      # Runs after the agent step (success or failure) so the reconciler can
      # find draft PRs the agent opened and track their state.
      - name: Tag PR as agent:implementing
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="$(git branch --show-current 2>/dev/null || echo "")"
          if [ -n "$BRANCH" ] && [ "$BRANCH" != "master" ]; then
            PR=$(gh pr list --state open --head "$BRANCH" --json number,labels \
              --jq '.[0] | {number,labels:[.labels[].name]}' 2>/dev/null || echo "")
            PR_NUM=$(echo "$PR" | jq -r '.number // empty' 2>/dev/null || echo "")
            if [ -n "$PR_NUM" ]; then
              gh pr edit "$PR_NUM" --add-label "agent:implementing" || true
              # Re-add converge label if it was stripped (e.g. by conflict detection)
              # and the PR body references an issue labeled agent-work.
              HAS_CONVERGE=$(echo "$PR" | jq -r '.labels | map(select(. == "converge")) | length' 2>/dev/null || echo "0")
              if [ "$HAS_CONVERGE" = "0" ]; then
                CLOSES=$(gh pr view "$PR_NUM" --json body --jq '.body' 2>/dev/null \
                  | grep -oE '(Closes|Fixes|Resolves) #[0-9]+' | grep -oE '[0-9]+' | head -1 || echo "")
                if [ -n "$CLOSES" ]; then
                  IS_AGENT_WORK=$(gh issue view "$CLOSES" --json labels \
                    --jq '.labels[].name' 2>/dev/null | grep -c "agent-work" || echo "0")
                  [ "$IS_AGENT_WORK" != "0" ] && gh pr edit "$PR_NUM" --add-label "converge" || true
                fi
              fi
            fi
          fi

      # ── Trigger CI after agent push ─────────────────────────────────────────
      # GitHub blocks pull_request:synchronize events for pushes made by Actions
      # tokens (loop prevention), so CI never auto-fires after an agent push.
      # Explicitly trigger it here so the pipeline doesn't stall until the next
      # 15-minute reconciler tick.
      - name: Trigger CI on agent branch
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="$(git branch --show-current 2>/dev/null || echo "")"
          [ -z "$BRANCH" ] || [ "$BRANCH" = "master" ] && exit 0
          HEAD="$(git rev-parse HEAD 2>/dev/null || echo "")"
          [ -z "$HEAD" ] && exit 0
          # Only trigger if no check-runs exist for this HEAD yet
          CI_RUNS=$(gh api "repos/${{ github.repository }}/commits/$HEAD/check-runs" \
            --jq '.total_count' 2>/dev/null || echo "0")
          if [ "$CI_RUNS" = "0" ]; then
            echo "Triggering CI on $BRANCH (no runs on $HEAD yet)"
            gh workflow run ci.yml --repo "${{ github.repository }}" --ref "$BRANCH" 2>/dev/null || true
          fi

      # ── Exit sentinel — catch silent agent exits ─────────────────────────────
      # If the agent exited without posting a status comment, post a rescue notice
      # so the state is never silently lost. Fires on success AND failure.
      - name: Verify exit comment posted
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_OR_PR="${{ github.event.issue.number || github.event.pull_request.number }}"
          [ -z "$ISSUE_OR_PR" ] && exit 0
          RUN_STARTED="${{ github.run_id }}"
          # Check if a comment containing ✅ or ⏸ was posted during this run
          RECENT=$(gh issue view "$ISSUE_OR_PR" --json comments \
            --jq "[.comments[] | select(.body | test(\"✅|⏸\"))] | length" \
            2>/dev/null || echo "0")
          if [ "$RECENT" = "0" ]; then
            CURRENT_BRANCH="$(git branch --show-current 2>/dev/null || echo "")"
            PR_NUM=$(gh pr list --state open --json number,headRefName \
              --jq ".[] | select(.headRefName == \"${CURRENT_BRANCH}\") | .number" \
              2>/dev/null | head -1 || echo "")
            if [ -n "$CURRENT_BRANCH" ] && [ "$CURRENT_BRANCH" != "master" ]; then
              BRANCH_HINT=" Check the branch \`${CURRENT_BRANCH}\` and re-dispatch if needed."
            else
              BRANCH_HINT=" Re-dispatch if needed."
            fi
            MSG="⚠️ Agent exited without posting a status comment (run \`$RUN_STARTED\`). Work may be incomplete.${BRANCH_HINT}"
            [ -n "$PR_NUM" ] && gh pr comment "$PR_NUM" --body "$MSG" || \
              gh issue comment "$ISSUE_OR_PR" --body "$MSG" || true
          fi

      # ── Post-mortem ─────────────────────────────────────────────────────────
      # Runs only when the agent step above fails (e.g. error_max_turns).
      # Rescues any uncommitted work the agent left on disk and posts a triage
      # comment to the issue/PR so the state is never silently lost.
      - name: Post-mortem — rescue uncommitted work on agent failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LOG=/home/runner/work/_temp/claude-execution-output.json
          REASON=$(jq -r '.terminal_reason // "unknown"' "$LOG" 2>/dev/null || echo "unknown")
          TURNS=$(jq -r  '.num_turns // "?"'            "$LOG" 2>/dev/null || echo "?")

          # Rescue uncommitted changes the agent wrote to disk before hitting the limit
          RESCUED=false
          if ! git diff --quiet HEAD 2>/dev/null || ! git diff --cached --quiet 2>/dev/null; then
            git add -A
            git commit -m "chore(recovery): partial work rescued at turn-limit exit (${TURNS} turns)"
            git push origin "$(git branch --show-current)" || true
            RESCUED=true
          fi

          # Extract the last thinking block — tells humans what the agent was mid-fix on
          LAST_THOUGHT=$(jq -r '
            [.. | objects | select(.thinking?) | .thinking] | last // "(no thinking block found)"
          ' "$LOG" 2>/dev/null | head -c 600 || echo "(log unavailable)")

          ISSUE_NUM="${{ github.event.issue.number || github.event.pull_request.number }}"
          CURRENT_BRANCH="$(git branch --show-current)"
          PR_NUM=$(gh pr list --state open --json number,headRefName \
            --jq ".[] | select(.headRefName == \"${CURRENT_BRANCH}\") | .number" \
            2>/dev/null | head -1 || echo "")

          printf '⚠️ **Agent exited after %s turns** (`%s`).\n\n' \
            "${TURNS}" "${REASON}" > /tmp/postmortem.md
          printf '**Uncommitted work rescued and pushed:** `%s`\n\n' \
            "${RESCUED}" >> /tmp/postmortem.md
          printf '<details><summary>Last agent thought (what it was mid-fix on)</summary>\n\n```\n' \
            >> /tmp/postmortem.md
          printf '%s\n```\n</details>\n\n' \
            "${LAST_THOUGHT}" >> /tmp/postmortem.md
          printf 'The PR is still a **draft**. To continue:\n' \
            >> /tmp/postmortem.md
          printf '- `gh pr ready %s` → fires the converge loop (recommended)\n' \
            "${PR_NUM}" >> /tmp/postmortem.md
          printf '- Or re-label this issue `agent-work` to re-dispatch from scratch.\n' \
            >> /tmp/postmortem.md

          [ -n "$ISSUE_NUM" ] && gh issue comment "$ISSUE_NUM" --body-file /tmp/postmortem.md || true
          [ -n "$PR_NUM"    ] && gh pr    comment "$PR_NUM"    --body-file /tmp/postmortem.md || true
