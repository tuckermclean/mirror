name: "Dispatch: Route to right agent"

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  dispatch:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'agent-work') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: read
      issues: write
    outputs:
      agent: ${{ steps.parse.outputs.agent }}
      model: ${{ steps.parse.outputs.model }}
      max_turns: ${{ steps.parse.outputs.max_turns }}
      task_type: ${{ steps.parse.outputs.task_type }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # Dispatcher is committed in .agents/custom/ — no clone needed for this job.

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions --model claude-haiku-4-5-20251001 --max-turns 5"
          prompt: |
            Load .agents/custom/receptionist-dispatcher.md

            Classify this and write .dispatch.json:
            EVENT: ${{ github.event_name }}
            TITLE: ${{ github.event.issue.title || github.event.pull_request.title || '' }}
            ISSUE BODY: ${{ github.event.issue.body || '' }}
            COMMENT: ${{ github.event.comment.body || '' }}

            Output ONLY valid JSON to .dispatch.json.

      - name: Parse routing
        id: parse
        run: |
          if [ -f .dispatch.json ] && jq -e . .dispatch.json > /dev/null 2>&1; then
            echo "agent=$(jq -r '.agent' .dispatch.json)" >> $GITHUB_OUTPUT
            echo "model=$(jq -r '.model' .dispatch.json)" >> $GITHUB_OUTPUT
            echo "max_turns=$(jq -r '.max_turns' .dispatch.json)" >> $GITHUB_OUTPUT
            echo "task_type=$(jq -r '.task_type' .dispatch.json)" >> $GITHUB_OUTPUT
          else
            echo "agent=.agents/engineering-senior-developer.md" >> $GITHUB_OUTPUT
            echo "model=claude-sonnet-4-6" >> $GITHUB_OUTPUT
            echo "max_turns=60" >> $GITHUB_OUTPUT
            echo "task_type=implement" >> $GITHUB_OUTPUT
          fi

      - name: Post routing decision
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            if (!require('fs').existsSync('.dispatch.json')) return;
            try {
              const r = JSON.parse(require('fs').readFileSync('.dispatch.json','utf8'));
              const agent = r.agent.split('/').pop().replace('.md','');
              const model = r.model.includes('haiku') ? 'haiku' : r.model.includes('opus') ? 'opus' : 'sonnet';
              const body = `🪼 Routing to **${agent}** on \`${model}\`\n> *${r.rationale}*`;
              const num = context.issue?.number || context.payload.issue?.number;
              if (num) await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: num, body
              });
            } catch(e) { console.log('Could not post routing:', e.message); }

  execute:
    needs: dispatch
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    timeout-minutes: 130

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup agents
        run: |
          git clone --depth 1 https://github.com/msitarzewski/agency-agents.git /tmp/agency-agents
          find /tmp/agency-agents -mindepth 2 -name "*.md" -exec cp {} .agents/ \;

      - name: Setup — strip agent attribution from commits
        run: |
          mkdir -p .git/hooks
          cat > .git/hooks/prepare-commit-msg << 'HOOK'
          #!/bin/sh
          # Backstop to .claude/settings.json (includeCoAuthoredBy:false): strip any
          # Claude/Anthropic co-author trailer and the "Generated with Claude Code" line.
          sed -i \
            -e '/^Co-authored-by:.*[Aa]nthropic/d' \
            -e '/^Co-authored-by:.*[Cc]laude/d' \
            -e '/Generated with \[Claude Code\]/d' \
            "$1"
          HOOK
          chmod +x .git/hooks/prepare-commit-msg

      - name: Find existing PR for issue
        id: existing_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          BRANCH=""
          if [ -n "$ISSUE_NUM" ]; then
            # Check open PRs whose body contains a closing keyword for this issue
            BRANCH=$(gh pr list --state open --json headRefName,body \
              --jq ".[] | select(.body | test(\"(Closes|closes|Fixes|fixes|Resolves|resolves) #${ISSUE_NUM}\")) | .headRefName" \
              2>/dev/null | head -1)
            # Fallback: check the issue timeline for cross-referenced PRs
            if [ -z "$BRANCH" ]; then
              PR_NUM=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUM}/timeline" \
                --jq '[.[] | select(.event == "cross-referenced") | select(.source.issue.pull_request != null) | .source.issue.number] | last' \
                2>/dev/null || echo "")
              if [ -n "$PR_NUM" ] && [ "$PR_NUM" != "null" ]; then
                BRANCH=$(gh pr view "$PR_NUM" --json headRefName,state \
                  --jq 'select(.state == "OPEN") | .headRefName' 2>/dev/null || echo "")
              fi
            fi
          fi
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          [ -n "$BRANCH" ] && echo "Existing PR branch: $BRANCH" || echo "No existing open PR found"

      - uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions --model ${{ needs.dispatch.outputs.model }} --max-turns ${{ needs.dispatch.outputs.max_turns }}"
          show_full_output: "true"
          prompt: |
            Load the agent at: ${{ needs.dispatch.outputs.agent }}
            Task type: ${{ needs.dispatch.outputs.task_type }}
            Follow ALL rules in AGENTS.md.

            EVENT: ${{ github.event_name }}
            ISSUE NUMBER: ${{ github.event.issue.number }}
            EXISTING BRANCH: ${{ steps.existing_pr.outputs.branch }}
            TITLE: ${{ github.event.issue.title || github.event.pull_request.title || '' }}
            ISSUE BODY: ${{ github.event.issue.body || '' }}
            COMMENT: ${{ github.event.comment.body || '' }}

            If COMMENT is non-empty, that is the specific request to fulfill — use ISSUE BODY as background only.

            DURABILITY — your work must survive running out of turns. Do this in order:
            For implement/fix/design tasks:
            - If EXISTING BRANCH is set: check it out and push additional work there — do NOT open a new PR.
            - If no existing branch: create a new branch (feat/<slug> or design/<slug> from master),
              make your FIRST commit as early as possible (even a stub/scaffold), then IMMEDIATELY
              open a DRAFT PR whose description includes "Closes #<ISSUE NUMBER>":
                gh pr create --draft --base master --head <branch> --title "<title>" \
                  --label converge --body "Closes #<ISSUE NUMBER>\n\n🚧 In progress."
            - Commit and `git push` after EACH meaningful step — never batch all work into one
              final commit. Incremental pushes mean a turn/timeout cutoff still leaves your progress.
            - Post a brief status comment early, then keep it updated:
                gh issue comment <ISSUE NUMBER> --body "🚧 Started on branch <branch>, draft PR #<n> open."
            - When the task is genuinely complete: mark the PR ready and ensure it has the
              converge label so the convergence loop fires:
                gh pr edit <n> --add-label converge
                gh pr ready <n>
              Then post a final summary comment. If you are running low on turns, leave the PR
              as a draft with a comment listing exactly what remains — do NOT spend your last
              turns polishing prose.

            For review/explain/plan tasks:
            - Post your response as a comment on the issue/PR FIRST (gh issue comment), then refine it.
            - Do NOT create branches or PRs for these.

            HONEST REPORTING — before posting any success/summary comment:
            - Run the project's own checks locally where possible (see AGENTS.md):
              `pnpm typecheck`, `pnpm lint`, `pnpm test:unit` (and `pnpm test:integration`
              if DATABASE_URL is set). Report each result factually.
            - Then run `gh pr checks <PR NUMBER>` to see the PR's REAL CI status.
            - Only mark a check ✅ if you actually verified it. If CI is still running,
              say so. If a check is failing, report it and state whether YOUR change
              caused it or it is a known pre-existing / non-blocking failure (e.g. the
              E2E job is non-blocking and red until Clerk/Anthropic secrets are set).
            - NEVER claim "all acceptance criteria verified" or post an all-green
              summary while any check you did not personally verify is red.

      # ── Post-mortem ─────────────────────────────────────────────────────────
      # Runs only when the agent step above fails (e.g. error_max_turns).
      # Rescues any uncommitted work the agent left on disk and posts a triage
      # comment to the issue/PR so the state is never silently lost.
      - name: Post-mortem — rescue uncommitted work on agent failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LOG=/home/runner/work/_temp/claude-execution-output.json
          REASON=$(jq -r '.terminal_reason // "unknown"' "$LOG" 2>/dev/null || echo "unknown")
          TURNS=$(jq -r  '.num_turns // "?"'            "$LOG" 2>/dev/null || echo "?")

          # Rescue uncommitted changes the agent wrote to disk before hitting the limit
          RESCUED=false
          if ! git diff --quiet HEAD 2>/dev/null || ! git diff --cached --quiet 2>/dev/null; then
            git add -A
            git commit -m "chore(recovery): partial work rescued at turn-limit exit (${TURNS} turns)"
            git push origin "$(git branch --show-current)" || true
            RESCUED=true
          fi

          # Extract the last thinking block — tells humans what the agent was mid-fix on
          LAST_THOUGHT=$(jq -r '
            [.. | objects | select(.thinking?) | .thinking] | last // "(no thinking block found)"
          ' "$LOG" 2>/dev/null | head -c 600 || echo "(log unavailable)")

          ISSUE_NUM="${{ github.event.issue.number }}"
          CURRENT_BRANCH="$(git branch --show-current)"
          PR_NUM=$(gh pr list --state open --json number,headRefName \
            --jq ".[] | select(.headRefName == \"${CURRENT_BRANCH}\") | .number" \
            2>/dev/null | head -1 || echo "")

          BODY="⚠️ **Agent exited after ${TURNS} turns** (\`${REASON}\`).

**Uncommitted work rescued and pushed:** \`${RESCUED}\`

<details><summary>Last agent thought (what it was mid-fix on)</summary>

\`\`\`
${LAST_THOUGHT}
\`\`\`
</details>

The PR is still a **draft**. To continue:
- \`gh pr ready ${PR_NUM}\` → fires the converge loop (recommended)
- Or re-label this issue \`agent-work\` to re-dispatch from scratch."

          [ -n "$ISSUE_NUM" ] && gh issue comment "$ISSUE_NUM" --body "$BODY" || true
          [ -n "$PR_NUM"    ] && gh pr    comment "$PR_NUM"    --body "$BODY" || true
